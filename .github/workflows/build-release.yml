name: Build Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install PyYAML>=6.0.1 "pygame-ce>=2.5.3"

      - name: Disable web server in config
        run: |
          python -c "
          import yaml
          with open('config/default.yaml', 'r') as f:
              cfg = yaml.safe_load(f)
          cfg.setdefault('web', {})['enabled'] = False
          with open('config/default.yaml', 'w') as f:
              yaml.dump(cfg, f, default_flow_style=False, sort_keys=False)
          "

      - name: Write VERSION file
        run: echo "${{ github.ref_name }}" | sed 's/^v//' > VERSION
        shell: bash

      - name: Build with PyInstaller
        run: pyinstaller build/airsoft_prop.spec

      - name: Copy config, assets, and VERSION alongside exe
        run: |
          xcopy /E /I config dist\AirsoftProp\config
          xcopy /E /I assets dist\AirsoftProp\assets
          copy VERSION dist\AirsoftProp\VERSION
        shell: cmd

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path dist/AirsoftProp -DestinationPath AirsoftProp-${{ github.ref_name }}-windows.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: AirsoftProp-${{ github.ref_name }}-windows.zip
          generate_release_notes: true
          body: |
            ## Airsoft Prop — Standalone Windows Build

            ### Anleitung
            1. ZIP entpacken
            2. `AirsoftProp.exe` doppelklicken (öffnet ein Terminal-Fenster)
            3. Numpad-Tasten zur Steuerung (siehe README)

            ### Voraussetzungen
            - Windows 10/11
            - **Windows Terminal** oder **PowerShell** empfohlen (für korrekte Darstellung)
            - Keine Python-Installation nötig

            ### Konfiguration
            Einstellungen können in `config/default.yaml` angepasst werden (Timer, Lautstärke, etc.)

            ### Hinweis
            Antivirus-Software kann bei PyInstaller-Executables False Positives melden.
            Die .exe ist sicher — der Quellcode ist öffentlich einsehbar.
