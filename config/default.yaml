audio:
  beep_10s: 0.5
  beep_30s: 2.0
  beep_5s: 0.2
  beep_normal: 5.0
  sounds:
    beep: assets/sounds/beep.wav
    defused: assets/sounds/defused.wav
    explosion: assets/sounds/explosion.wav
    planted: assets/sounds/planted.wav
    siren: assets/sounds/siren.wav
    wrong: assets/sounds/wrong.wav
  volume: 0.5
display:
  backlight: true
  boot_duration: 2.5
game:
